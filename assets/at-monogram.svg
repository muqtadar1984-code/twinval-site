<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" aria-label="Aethel Twin — AT monogram seal">
  <title>Aethel Twin — AT Monogram Seal</title>

  <defs>
    <style>
      .seal-ring    { fill: none; stroke: #C9A84C; stroke-width: 2.2; }
      .seal-outer   { fill: none; stroke: #C9A84C; stroke-width: 3.2; }
      .mono        { fill: #C9A84C; }
      .mono-inner  { fill: none; stroke: #0D2137; stroke-width: 2; }
    </style>
  </defs>

  <!-- Double-ring seal -->
  <circle class="seal-outer" cx="120" cy="120" r="108"/>
  <circle class="seal-ring"  cx="120" cy="120" r="98"/>

  <!-- T — top horizontal crossbar (filled bar with inner line for double-stroke effect) -->
  <rect class="mono" x="52" y="66" width="136" height="14"/>
  <line class="mono-inner" x1="56" y1="73" x2="184" y2="73"/>

  <!-- T — vertical stem -->
  <rect class="mono" x="113" y="66" width="14" height="112"/>
  <line class="mono-inner" x1="120" y1="70" x2="120" y2="174"/>

  <!-- A — left diagonal leg -->
  <polygon class="mono" points="75,178 98,66 108,66 88,178"/>
  <line class="mono-inner" x1="83" y1="172" x2="103" y2="72"/>

  <!-- A — right diagonal leg -->
  <polygon class="mono" points="132,66 142,66 165,178 152,178"/>
  <line class="mono-inner" x1="137" y1="72" x2="157" y2="172"/>

  <!-- A — horizontal crossbar (middle) -->
  <rect class="mono" x="88" y="118" width="64" height="11"/>
  <line class="mono-inner" x1="92" y1="124" x2="148" y2="124"/>
</svg>
